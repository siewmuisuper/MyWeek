<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyWeek</title>
<style>
/* ── Palette ────────────────────────────────────────────────────────────── */
:root {
  --cream:        #EDE6DE;
  --cream-light:  #F5F0EB;
  --cream-dark:   #D9D0C6;
  --teal:         #8CBEC8;
  --teal-dark:    #6AA4B0;
  --teal-light:   #C2DDE2;
  --lav:          #B0A4C4;
  --lav-dark:     #9488B0;
  --lav-light:    #DDD8EA;
  --surface:      #FFFFFF;
  --border:       #DDD6CE;
  --text:         #3A2E3A;
  --muted:        #7A6E7A;
  --meta:         #A898A8;
  --high:         #C0624A;
  --med:          #C09050;
  --low:          #5A9E78;
  --stale-bg:     #FFF4E0;
  --stale-border: #E0B860;
  --stale-text:   #A07820;
  --r:            10px;
  --r-sm:         6px;
  --sh:           0 1px 4px rgba(58,46,58,.08);
  --sh-md:        0 4px 16px rgba(58,46,58,.14);
}
html.dark {
  --cream:        #1E1820; --cream-light: #251F28; --cream-dark: #161218;
  --surface:      #2A2330; --border: #3A3242;
  --text:         #EDE6DE; --muted: #A898A8; --meta: #6A5E6A;
  --teal-light:   #1A3A42; --lav-light: #2A2438;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--cream); color: var(--text);
  min-height: 100vh; -webkit-tap-highlight-color: transparent;
}
input, textarea, select, button { font-family: inherit; font-size: inherit; }
a { color: var(--teal-dark); }

/* ── Setup ──────────────────────────────────────────────────────────────── */
#setup { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.setup-card { background:var(--surface); border-radius:var(--r); padding:40px 36px; max-width:480px; width:100%; box-shadow:var(--sh-md); border:1px solid var(--border); }
.setup-logo { font-size:28px; font-weight:800; color:var(--teal-dark); margin-bottom:20px; }
.setup-logo span { color:var(--lav-dark); }
.setup-card h2 { font-size:16px; font-weight:600; margin-bottom:8px; }
.setup-card p  { font-size:13px; color:var(--muted); margin-bottom:20px; line-height:1.6; }
.setup-input { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--r-sm); font-size:13px; background:var(--cream-light); color:var(--text); margin-bottom:14px; outline:none; transition:border-color .2s; }
.setup-input:focus { border-color:var(--teal); }
.setup-btn { width:100%; padding:11px; background:var(--teal); color:#fff; border:none; border-radius:var(--r-sm); font-size:14px; font-weight:600; cursor:pointer; }
.setup-btn:hover { background:var(--teal-dark); }
.setup-note { font-size:11px; color:var(--meta); margin-top:12px; text-align:center; }

/* ── App shell ──────────────────────────────────────────────────────────── */
#app { display:flex; flex-direction:column; height:100dvh; overflow:hidden; }
.hidden { display:none !important; }

/* ── Header ─────────────────────────────────────────────────────────────── */
.app-header { background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; padding:0 16px; height:52px; flex-shrink:0; box-shadow:var(--sh); z-index:10; }
.logo { font-size:18px; font-weight:800; color:var(--teal-dark); white-space:nowrap; }
.logo span { color:var(--lav-dark); }
.intention-wrap { flex:1; display:flex; align-items:center; gap:8px; background:var(--cream-light); border:1px solid var(--border); border-radius:20px; padding:5px 14px; min-width:0; }
.intention-label { font-size:11px; color:var(--meta); white-space:nowrap; }
.intention-input { flex:1; border:none; background:transparent; font-size:13px; color:var(--text); outline:none; min-width:0; }
.intention-input::placeholder { color:var(--meta); }
.hdr-btn { width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--cream-light); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; transition:background .2s; }
.hdr-btn:hover { background:var(--teal-light); }

/* ── Tab bar ─────────────────────────────────────────────────────────────── */
.tab-bar { background:var(--surface); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; flex-shrink:0; scrollbar-width:none; padding:0 8px; }
.tab-bar::-webkit-scrollbar { display:none; }
.tab { padding:10px 13px 0; font-size:12px; font-weight:600; color:var(--meta); cursor:pointer; white-space:nowrap; border-bottom:3px solid transparent; display:flex; flex-direction:column; align-items:center; gap:4px; transition:color .15s; flex-shrink:0; user-select:none; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--teal-dark); border-bottom-color:var(--teal); }
.tab-prog { width:100%; height:3px; background:var(--cream-dark); border-radius:2px; margin-bottom:2px; }
.tab-prog-fill { height:100%; background:var(--low); border-radius:2px; transition:width .4s; }

/* ── Content ─────────────────────────────────────────────────────────────── */
.content { flex:1; overflow-y:auto; padding:16px 18px; background:var(--cream); }
@media(min-width:768px){ .content { padding:20px 28px; max-width:1100px; margin:0 auto; width:100%; } }
.loading { display:flex; align-items:center; justify-content:center; gap:10px; padding:40px; color:var(--muted); font-size:13px; }
.spinner { width:18px; height:18px; border:2px solid var(--teal-light); border-top-color:var(--teal); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Layout helpers ──────────────────────────────────────────────────────── */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media(max-width:700px){ .two-col { grid-template-columns:1fr; } }
.kanban { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
@media(max-width:700px){ .kanban { grid-template-columns:1fr; } }
.kanban-col { background:var(--cream-light); border-radius:var(--r); padding:11px; border:1px solid var(--border); }
.kanban-col-hdr { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--meta); margin-bottom:8px; display:flex; align-items:center; gap:5px; }

/* ── Sections ────────────────────────────────────────────────────────────── */
.sec-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:14px 0 8px; display:flex; align-items:center; gap:6px; }
.sec-title:first-child { margin-top:0; }
.count-badge { background:var(--lav-light); color:var(--lav-dark); border-radius:10px; padding:1px 7px; font-size:10px; font-weight:700; }
.sec-divider { border:none; border-top:1px solid var(--border); margin:14px 0; }

/* ── Progress bar ────────────────────────────────────────────────────────── */
.prog-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.prog-bg { flex:1; height:6px; background:var(--cream-dark); border-radius:3px; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--teal),var(--lav)); border-radius:3px; transition:width .4s; }
.prog-label { font-size:11px; color:var(--meta); white-space:nowrap; }

/* ── Quick add ───────────────────────────────────────────────────────────── */
.quick-add { display:flex; align-items:center; gap:8px; background:var(--surface); border:1.5px dashed var(--cream-dark); border-radius:var(--r-sm); padding:8px 12px; margin-bottom:8px; cursor:text; transition:border-color .2s; }
.quick-add:hover,.quick-add.focused { border-color:var(--teal); }
.qa-plus { font-size:18px; color:var(--teal); font-weight:300; line-height:1; }
.qa-input { flex:1; border:none; background:transparent; font-size:13px; color:var(--text); outline:none; }
.qa-input::placeholder { color:var(--meta); }

/* ── Task card ───────────────────────────────────────────────────────────── */
.task-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:9px 12px; margin-bottom:5px; display:flex; align-items:flex-start; gap:7px; box-shadow:var(--sh); }
.task-card.t-stale { border-left:3px solid var(--stale-border); }
.task-card.t-done  { opacity:.6; }
.task-check { display:flex; align-items:center; padding-top:2px; flex-shrink:0; cursor:pointer; }
.task-check input { display:none; }
.checkmark { width:17px; height:17px; border-radius:4px; border:2px solid var(--cream-dark); display:flex; align-items:center; justify-content:center; transition:all .15s; background:var(--cream-light); }
.task-check input:checked + .checkmark { background:var(--teal); border-color:var(--teal); }
.task-check input:checked + .checkmark::after { content:'✓'; color:#fff; font-size:10px; font-weight:800; }
.task-body { flex:1; min-width:0; }
.task-title { font-size:13px; color:var(--text); display:block; word-break:break-word; }
.task-title.done { text-decoration:line-through; color:var(--meta); }
.task-due  { font-size:11px; color:var(--meta); margin-top:2px; display:block; }
.task-meta { font-size:11px; color:var(--meta); margin-top:2px; display:block; }
.task-actions { display:flex; align-items:center; gap:3px; flex-shrink:0; }
.stale-row { background:var(--stale-bg); border-top:1px solid var(--stale-border); border-radius:0 0 var(--r-sm) var(--r-sm); padding:5px 12px; display:flex; align-items:center; gap:7px; font-size:11px; color:var(--stale-text); margin-top:6px; margin-left:-12px; margin-right:-12px; margin-bottom:-9px; flex-wrap:wrap; }
.stale-row span { flex:1; }

/* ── Impact bolt ─────────────────────────────────────────────────────────── */
.bolt-btn { background:none; border:none; cursor:pointer; padding:2px; font-size:13px; opacity:.25; transition:opacity .15s, transform .15s; flex-shrink:0; line-height:1; margin-top:2px; }
.bolt-btn:hover { opacity:.6; }
.bolt-btn.on { opacity:1; }
.bolt-btn.on:hover { transform:scale(1.2); }

/* ── Dots & tags ─────────────────────────────────────────────────────────── */
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; cursor:pointer; }
.dot-high { background:var(--high); } .dot-medium { background:var(--med); } .dot-low { background:var(--low); }
.tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; background:var(--lav-light); color:var(--lav-dark); white-space:nowrap; }
.tag-green  { background:#E2F0E8; color:#3A7A52; }
.tag-orange { background:#FFF0DC; color:#A07020; }
.tag-red    { background:#FCE8E4; color:#A04030; }
.tag-teal   { background:var(--teal-light); color:var(--teal-dark); }
.stale-badge { display:inline-flex; align-items:center; gap:3px; background:var(--stale-bg); border:1px solid var(--stale-border); border-radius:10px; padding:1px 7px; font-size:10px; color:var(--stale-text); }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.icon-btn-sm { width:24px; height:24px; border-radius:50%; border:none; background:transparent; color:var(--meta); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.icon-btn-sm:hover { background:var(--cream-dark); color:var(--text); }
.btn-keep { padding:2px 8px; border-radius:4px; font-size:10px; font-weight:600; background:#E2F0E8; color:#3A7A52; border:1px solid #A8D4B8; cursor:pointer; }
.btn-drop { padding:2px 8px; border-radius:4px; font-size:10px; font-weight:600; background:#FCE8E4; color:#A04030; border:1px solid #E0B0A8; cursor:pointer; }
.btn-primary   { padding:8px 18px; background:var(--teal); color:#fff; border:none; border-radius:var(--r-sm); font-size:13px; font-weight:600; cursor:pointer; }
.btn-primary:hover { background:var(--teal-dark); }
.btn-secondary { padding:8px 18px; background:var(--cream-light); color:var(--text); border:1px solid var(--border); border-radius:var(--r-sm); font-size:13px; cursor:pointer; }
.btn-danger    { padding:8px 14px; background:#FCE8E4; color:#A04030; border:1px solid #E0B0A8; border-radius:var(--r-sm); font-size:13px; cursor:pointer; }
.btn-sm { padding:3px 9px; border-radius:4px; font-size:11px; font-weight:600; background:var(--cream-light); border:1px solid var(--border); cursor:pointer; color:var(--muted); }
.btn-sm:hover { background:var(--teal-light); color:var(--teal-dark); }
.btn-add { display:inline-flex; align-items:center; gap:5px; padding:6px 14px; background:var(--teal-light); color:var(--teal-dark); border:1px solid var(--teal); border-radius:var(--r-sm); font-size:12px; font-weight:600; cursor:pointer; margin-top:8px; }
.btn-add:hover { background:var(--teal); color:#fff; }
.cal-link { display:inline-flex; align-items:center; padding:1px 7px; border-radius:4px; font-size:10px; font-weight:600; background:var(--teal-light); color:var(--teal-dark); border:1px solid var(--teal); margin-left:6px; cursor:pointer; text-decoration:none; }
.cal-link:hover { background:var(--teal); color:#fff; }
.no-date-btn { font-size:10px; color:var(--meta); background:none; border:none; cursor:pointer; text-decoration:underline dotted; }

/* ── Grocery ─────────────────────────────────────────────────────────────── */
.grocery-cat { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; color:var(--meta); margin:12px 0 5px; }
.grocery-cat:first-child { margin-top:0; }

/* ── MIT section (Today tab) ─────────────────────────────────────────────── */
.mit-section { background:linear-gradient(135deg,var(--teal-light) 0%,var(--lav-light) 100%); border-radius:var(--r); padding:14px 16px; margin-bottom:16px; border:1px solid var(--teal-light); }
.mit-header { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; color:var(--teal-dark); margin-bottom:10px; display:flex; align-items:center; gap:6px; justify-content:space-between; }
.mit-slot { background:rgba(255,255,255,.75); border:1.5px solid var(--teal-light); border-radius:var(--r-sm); padding:8px 12px; margin-bottom:6px; display:flex; align-items:center; gap:9px; }
.mit-slot.empty { border-style:dashed; background:rgba(255,255,255,.4); }
.mit-num { width:20px; height:20px; border-radius:50%; background:var(--teal); color:#fff; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.mit-num.empty { background:var(--cream-dark); }
.mit-input { flex:1; border:none; background:transparent; font-size:13px; color:var(--text); outline:none; }
.mit-input::placeholder { color:var(--meta); }
.mit-area { font-size:10px; color:var(--teal-dark); background:rgba(140,190,200,.2); padding:2px 7px; border-radius:10px; white-space:nowrap; }

/* ── Today area tags ─────────────────────────────────────────────────────── */
.today-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:9px 12px; margin-bottom:5px; display:flex; align-items:center; gap:8px; box-shadow:var(--sh); }
.area-pill { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; white-space:nowrap; flex-shrink:0; }
.a-work     { background:var(--teal-light);  color:var(--teal-dark); }
.a-twinkle  { background:var(--lav-light);   color:var(--lav-dark); }
.a-parents  { background:#FFF0DC;            color:#A07020; }
.a-health   { background:#E2F0E8;            color:#3A7A52; }
.a-supermarket { background:var(--cream-dark); color:var(--muted); }
.a-leisure  { background:#FCE8E4;            color:#A04030; }

/* ── Habit tracker ───────────────────────────────────────────────────────── */
.habits-table { display:flex; flex-direction:column; gap:5px; }
.habit-row { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 12px; display:flex; align-items:center; gap:10px; }
.habit-name { font-size:12px; color:var(--text); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.habit-days { display:flex; gap:4px; flex-shrink:0; }
.habit-day { width:26px; height:26px; border-radius:var(--r-sm); background:var(--cream-light); border:1.5px solid var(--cream-dark); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; color:var(--meta); cursor:pointer; user-select:none; transition:all .15s; }
.habit-day:hover { border-color:var(--teal); }
.habit-day.done  { background:var(--teal); border-color:var(--teal); color:#fff; }
.habit-day.today { border-color:var(--lav); }
.habit-day.done.today { background:var(--lav); border-color:var(--lav); }

/* ── Draft cards ─────────────────────────────────────────────────────────── */
.draft-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px; margin-bottom:8px; box-shadow:var(--sh); }
.draft-hdr  { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:5px; }
.draft-title   { font-size:13px; font-weight:600; color:var(--text); }
.draft-preview { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:8px; }
.draft-footer  { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.draft-actions { margin-left:auto; display:flex; gap:5px; }

/* ── Weekly Review ───────────────────────────────────────────────────────── */
.review-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:14px; }
.review-hdr  { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; margin-bottom:12px; display:flex; align-items:center; gap:7px; }
.rh-lookback { color:var(--lav-dark); }
.rh-balance  { color:var(--low); }
.rh-stale    { color:var(--stale-text); }
.rh-mit      { color:var(--teal-dark); }
.rh-intention{ color:var(--lav-dark); }
.review-q    { margin-bottom:12px; }
.review-q:last-child { margin-bottom:0; }
.review-prompt { font-size:12px; color:var(--muted); margin-bottom:5px; }
.review-ta { width:100%; background:var(--cream-light); border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 10px; font-size:13px; color:var(--text); resize:none; min-height:52px; outline:none; transition:border-color .2s; line-height:1.6; }
.review-ta:focus { border-color:var(--teal); }
.balance-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.balance-label { font-size:12px; color:var(--text); width:100px; flex-shrink:0; }
.balance-dots  { display:flex; gap:5px; }
.bdot { width:22px; height:22px; border-radius:50%; border:2px solid var(--cream-dark); background:var(--cream-light); cursor:pointer; transition:all .15s; flex-shrink:0; }
.bdot:hover { border-color:var(--teal); }
.bdot.filled { border-color:var(--teal); background:var(--teal); }
.balance-score { font-size:12px; font-weight:700; width:28px; text-align:right; flex-shrink:0; }
.stale-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--cream-dark); }
.stale-item:last-child { border-bottom:none; }
.stale-days { font-size:10px; color:var(--stale-text); background:var(--stale-bg); border:1px solid var(--stale-border); border-radius:10px; padding:2px 7px; white-space:nowrap; }
.stale-actions { display:flex; gap:4px; }
.mit-next { display:flex; align-items:center; gap:9px; background:var(--cream-light); border:1.5px solid var(--border); border-radius:var(--r-sm); padding:8px 12px; margin-bottom:7px; }
.mit-ta { flex:1; border:none; background:transparent; font-size:13px; color:var(--text); outline:none; }
.mit-ta::placeholder { color:var(--meta); }

/* ── Modal ───────────────────────────────────────────────────────────────── */
.modal-overlay { position:fixed; inset:0; background:rgba(30,20,30,.45); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; backdrop-filter:blur(2px); }
.modal { background:var(--surface); border-radius:var(--r); width:100%; max-width:480px; max-height:90vh; overflow:hidden; display:flex; flex-direction:column; box-shadow:var(--sh-md); border:1px solid var(--border); }
.modal-hdr { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
.modal-hdr h3 { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; font-size:20px; color:var(--meta); cursor:pointer; line-height:1; }
.modal-body { padding:18px 20px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:10px; }
.modal-body label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--meta); margin-bottom:-4px; }
.modal-ftr { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; }
.form-input,.form-select { width:100%; padding:8px 12px; border:1.5px solid var(--border); border-radius:var(--r-sm); font-size:13px; background:var(--cream-light); color:var(--text); outline:none; transition:border-color .2s; }
.form-input:focus,.form-select:focus { border-color:var(--teal); }
.form-textarea { width:100%; min-height:110px; padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--r-sm); font-size:13px; line-height:1.6; background:var(--cream-light); color:var(--text); resize:vertical; outline:none; transition:border-color .2s; }
.form-textarea:focus { border-color:var(--teal); }
.priority-picker { display:flex; gap:8px; }
.p-btn { flex:1; padding:7px; border-radius:var(--r-sm); border:1.5px solid var(--border); background:var(--cream-light); font-size:12px; font-weight:600; cursor:pointer; color:var(--meta); }
.p-btn.active-high   { background:#FCE8E4; border-color:var(--high);  color:var(--high); }
.p-btn.active-medium { background:#FFF0DC; border-color:var(--med);   color:var(--med); }
.p-btn.active-low    { background:#E2F0E8; border-color:var(--low);   color:var(--low); }

/* ── Toast ───────────────────────────────────────────────────────────────── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:9px 18px; border-radius:20px; font-size:13px; font-weight:600; z-index:2000; white-space:nowrap; box-shadow:var(--sh-md); animation:fadeUp .2s ease; }
.toast-ok    { background:var(--teal); color:#fff; }
.toast-error { background:#C0624A; color:#fff; }
@keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } }
.empty-state { text-align:center; padding:24px; font-size:13px; color:var(--muted); background:var(--surface); border:1px dashed var(--border); border-radius:var(--r); }
.notes-area { width:100%; min-height:160px; padding:12px; font-size:13px; line-height:1.7; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--text); resize:vertical; outline:none; transition:border-color .2s; }
.notes-area:focus { border-color:var(--teal); }
</style>
</head>
<body>

<!-- Setup -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-logo">My<span>Week</span></div>
    <h2>Connect your Google Sheet</h2>
    <p>Paste your Google Apps Script Web App URL. Stored only in this browser — never in code.</p>
    <input id="setup-url" class="setup-input" type="url" placeholder="https://script.google.com/macros/s/…/exec" onkeydown="if(event.key==='Enter')saveSetup()">
    <button class="setup-btn" onclick="saveSetup()">Connect &amp; Start →</button>
    <p class="setup-note">See setup instructions in myweek-script.gs</p>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <header class="app-header">
    <div class="logo">My<span>Week</span></div>
    <div class="intention-wrap">
      <span class="intention-label">This week...</span>
      <input id="intention" class="intention-input" type="text" placeholder="What would make this week great?" oninput="onIntentionInput()">
    </div>
    <button class="hdr-btn" onclick="toggleDark()" title="Dark mode">🌙</button>
    <button class="hdr-btn" onclick="refreshAll()" title="Refresh">↻</button>
    <button class="hdr-btn" onclick="openSettings()" title="Settings">⚙</button>
  </header>
  <nav class="tab-bar" id="tab-bar"></nav>
  <main class="content" id="content">
    <div class="loading"><div class="spinner"></div> Loading…</div>
  </main>
</div>

<!-- Modal -->
<div id="overlay" class="modal-overlay hidden" onclick="closeModal()">
  <div id="modal" class="modal" onclick="event.stopPropagation()"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG & STATE
// ─────────────────────────────────────────────────────────────────────────────
const URL_KEY   = 'mw_url';
const DARK_KEY  = 'mw_dark';
const STALE_DAYS = 14;

const TABS = [
  { id:'today',       icon:'🌅', label:'Today'          },
  { id:'work',        icon:'💼', label:'Work'           },
  { id:'twinkle',     icon:'💜', label:'Twinkle Hearts' },
  { id:'parents',     icon:'🏠', label:'Parents'        },
  { id:'health',      icon:'🌿', label:'Health'         },
  { id:'supermarket', icon:'🛒', label:'Supermarket'    },
  { id:'leisure',     icon:'🎯', label:'Leisure & Learn'},
  { id:'review',      icon:'📋', label:'Weekly Review'  },
];

const BALANCE_AREAS = ['Work','Twinkle Hearts','Health','Family','Leisure','Learning'];

let SCRIPT_URL = localStorage.getItem(URL_KEY) || '';
let currentTab = 'today';
let tasks  = [];
let drafts = [];
let habits = { habits:[], logs:[] };
let cfg    = {};

// ─────────────────────────────────────────────────────────────────────────────
// API  — all calls use GET to avoid Apps Script POST/redirect CORS issues
// ─────────────────────────────────────────────────────────────────────────────
async function api(action, params = {}) {
  const u = new URL(SCRIPT_URL);
  u.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => { if (v != null) u.searchParams.set(k, String(v)); });
  const r = await fetch(u.toString());
  const j = await r.json();
  if (!j.success) throw new Error(j.error || action + ' failed');
  return j.data;
}

// Alias — writes also use GET
const apiPost = api;

async function loadAll() {
  setContent('<div class="loading"><div class="spinner"></div> Loading your week…</div>');
  try {
    const [t, d, h, c] = await Promise.all([
      api('getTasks'), api('getDrafts'), api('getHabits'), api('getConfig')
    ]);
    tasks  = Array.isArray(t) ? t : [];
    drafts = Array.isArray(d) ? d : [];
    habits = (h && h.habits) ? h : { habits:[], logs:[] };
    cfg    = c || {};
    const el = document.getElementById('intention');
    if (el && cfg.intention) el.value = cfg.intention;
  } catch(e) {
    toast('Load error: ' + e.message, 'error');
  }
  renderTab(currentTab);
  updateTabProgress();
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────────────────────
const tabTasks  = tab  => tasks.filter(t => t.tab === tab);
const isStale   = t    => t.status !== 'done' && daysSince(t.created_at) >= STALE_DAYS;
const allStale  = ()   => tasks.filter(isStale);
const daysSince = s    => s ? Math.floor((Date.now()-new Date(s))/86400000) : 0;
const esc       = s    => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isImpact  = t    => t.impact==='true' || t.impact===true;

function gcalUrl(title, date) {
  if (!date) return null;
  const d = new Date(date), n = new Date(d); n.setDate(d.getDate()+1);
  const f = x => x.toISOString().slice(0,10).replace(/-/g,'');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${f(d)}/${f(n)}`;
}

function setContent(html) { document.getElementById('content').innerHTML = html; }

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast toast-${type}`;
  clearTimeout(el._t); el._t = setTimeout(()=>el.className='toast hidden', 2800);
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

// ─────────────────────────────────────────────────────────────────────────────
// TASK CRUD
// ─────────────────────────────────────────────────────────────────────────────
async function addTask(tab, title, section='', priority='medium') {
  if (!title.trim()) return;
  const tmp = 'tmp_'+Date.now();
  tasks.push({ id:tmp, tab, section, title:title.trim(), priority, status:'pending', due_date:'', notes:'', impact:'false', created_at:new Date().toISOString() });
  renderTab(currentTab); updateTabProgress();
  try {
    const r = await api('addTask', { tab, section, title:title.trim(), priority });
    const i = tasks.findIndex(x=>x.id===tmp); if (i>=0) tasks[i].id = r.id;
  } catch(e) {
    tasks = tasks.filter(x=>x.id!==tmp); renderTab(currentTab); toast('Add failed','error');
  }
}

async function toggleTask(id) {
  const t = tasks.find(x=>x.id===id); if (!t) return;
  t.status = t.status==='done'?'pending':'done';
  renderTab(currentTab); updateTabProgress();
  try { await api('updateTask',{id,status:t.status}); } catch(e) { t.status=t.status==='done'?'pending':'done'; renderTab(currentTab); }
}

async function removeTask(id) {
  tasks = tasks.filter(x=>x.id!==id); renderTab(currentTab); updateTabProgress();
  try { await api('deleteTask',{id}); } catch(e) { toast('Delete failed','error'); }
}

async function patchTask(id, fields) {
  const t = tasks.find(x=>x.id===id); if (!t) return;
  Object.assign(t, fields);
  try { await api('updateTask',{id,...fields}); } catch(e) { toast('Save failed','error'); }
}

async function toggleImpact(id) {
  const t = tasks.find(x=>x.id===id); if (!t) return;
  const val = isImpact(t) ? 'false' : 'true';
  await patchTask(id, { impact: val });
  renderTab(currentTab);
}

async function snoozeStale(id) {
  await patchTask(id, { created_at: new Date().toISOString() });
  renderTab(currentTab);
}

async function moveTask(id, section) {
  await patchTask(id, { section });
  renderTab(currentTab);
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function progBar(done, total) {
  const p = total ? Math.round(done/total*100) : 0;
  return `<div class="prog-row"><div class="prog-bg"><div class="prog-fill" style="width:${p}%"></div></div><span class="prog-label">${done} / ${total} done</span></div>`;
}

function secTitle(label, count) {
  return `<div class="sec-title">${esc(label)}${count!=null?`<span class="count-badge">${count}</span>`:''}</div>`;
}

function quickAdd(tab, section, ph='Add task…') {
  return `<div class="quick-add" onclick="this.querySelector('input').focus()">
    <span class="qa-plus">+</span>
    <input class="qa-input" type="text" placeholder="${ph}" data-tab="${tab}" data-sec="${section}"
      onkeydown="if(event.key==='Enter'){addTask(this.dataset.tab,this.value,this.dataset.sec);this.value='';}"
      onfocus="this.closest('.quick-add').classList.add('focused')"
      onblur="this.closest('.quick-add').classList.remove('focused')">
  </div>`;
}

function boltBtn(t) {
  const on = isImpact(t);
  return `<button class="bolt-btn${on?' on':''}" onclick="toggleImpact('${t.id}')" title="${on?'High impact — click to unmark':'Mark as high impact'}">⚡</button>`;
}

function taskCard(t) {
  const stale = isStale(t), done = t.status==='done';
  const cal   = t.due_date ? gcalUrl(t.title, t.due_date) : null;
  return `<div class="task-card${stale?' t-stale':''}${done?' t-done':''}">
    <label class="task-check" onclick="toggleTask('${t.id}')"><input type="checkbox" ${done?'checked':''}><span class="checkmark"></span></label>
    ${boltBtn(t)}
    <div class="task-body">
      <span class="task-title${done?' done':''}">${esc(t.title)}</span>
      ${t.due_date?`<span class="task-due">📅 ${esc(t.due_date)}${cal?`<a href="${cal}" target="_blank" class="cal-link">+Cal</a>`:''}</span>`:''}
      ${stale?`<span class="stale-badge">⏰ ${daysSince(t.created_at)}d old</span>`:''}
    </div>
    <div class="task-actions">
      <span class="dot dot-${t.priority||'medium'}"></span>
      <button class="icon-btn-sm" onclick="openTaskMenu('${t.id}')">⋯</button>
    </div>
    ${stale?`<div class="stale-row"><span>Still want this?</span><button class="btn-keep" onclick="snoozeStale('${t.id}')">Keep</button><button class="btn-drop" onclick="removeTask('${t.id}')">Remove</button></div>`:''}
  </div>`;
}

function kanbanTab(tab, extraSections) {
  const all     = tabTasks(tab);
  const pending = all.filter(t=>t.status!=='done');
  const done    = all.filter(t=>t.status==='done');
  let h = progBar(done.length, all.length);
  h += quickAdd(tab,'','Add task…');
  h += `<div class="kanban">`;
  [['today','Today'],['week','This Week'],['someday','Someday']].forEach(([sec,label]) => {
    const items = pending.filter(t=>t.section===sec||(sec==='week'&&!t.section&&t.section!=='today'&&t.section!=='someday'));
    h += `<div class="kanban-col"><div class="kanban-col-hdr">${label}<span class="count-badge">${items.length}</span></div>${quickAdd(tab,sec,'Add…')}${items.map(taskCard).join('')}</div>`;
  });
  h += `</div>`;
  if (extraSections) h += extraSections;
  if (done.length) h += `<hr class="sec-divider">${secTitle('Done',done.length)}${done.slice(-6).map(taskCard).join('')}`;
  return h;
}

// ─────────────────────────────────────────────────────────────────────────────
// TAB: TODAY
// ─────────────────────────────────────────────────────────────────────────────
function renderToday() {
  // MIT slots
  let mit = `<div class="mit-section">
    <div class="mit-header"><span>⚡ Today's MIT — Most Important Tasks</span><span style="font-size:10px;font-weight:400;color:var(--teal-dark)">Max 3 · set weekly in Review tab</span></div>`;
  [1,2,3].forEach(n => {
    const val = cfg[`mit_today_${n}`] || '';
    const empty = !val.trim();
    mit += `<div class="mit-slot${empty?' empty':''}">
      <div class="mit-num${empty?' empty':''}">${n}</div>
      <input class="mit-input" type="text" value="${esc(val)}" placeholder="Add priority ${n}…"
        oninput="saveMIT(${n},this.value)" data-mit="${n}">
    </div>`;
  });
  mit += `</div>`;

  // Today's tasks from all tabs
  const todayItems = tasks.filter(t => t.status!=='done' && (t.section==='today' || t.due_date===new Date().toISOString().slice(0,10)));
  const todayStr = new Date().toISOString().slice(0,10);

  // Habits for today
  const habitsHtml = habits.habits.length ? `
    ${secTitle('🌿 Habits today')}
    ${habits.habits.map(hb => {
      const log = (habits.logs||[]).find(l=>l.habit_id===hb.id&&l.log_date===todayStr);
      const done = log && (log.done===true||log.done==='true');
      return `<div class="today-card">
        <label class="task-check" onclick="toggleHabit('${hb.id}','${todayStr}',${!done})"><input type="checkbox" ${done?'checked':''}><span class="checkmark"></span></label>
        <div style="flex:1;font-size:13px;color:var(--text)">${esc(hb.emoji||'⭐')} ${esc(hb.name)}</div>
        <span class="area-pill a-health">Health</span>
      </div>`;
    }).join('')}` : '';

  let h = mit;
  if (todayItems.length || habitsHtml) {
    h += secTitle('Everything else today', todayItems.length + habits.habits.length);
    todayItems.forEach(t => {
      const areaCls = `a-${t.tab}`;
      const areaLabel = TABS.find(x=>x.id===t.tab)?.label || t.tab;
      h += `<div class="today-card">
        <label class="task-check" onclick="toggleTask('${t.id}')"><input type="checkbox" ${t.status==='done'?'checked':''}><span class="checkmark"></span></label>
        ${boltBtn(t)}
        <div class="task-body"><span class="task-title${t.status==='done'?' done':''}">${esc(t.title)}</span></div>
        <span class="area-pill ${areaCls}">${areaLabel}</span>
      </div>`;
    });
    h += habitsHtml;
  } else {
    h += `<div class="empty-state">Nothing due today. Move tasks to Today in their tabs, or set a due date.</div>`;
  }

  // Impact ratio this week
  const weekPending = tasks.filter(t=>t.status!=='done');
  const impactCount = weekPending.filter(isImpact).length;
  if (weekPending.length > 0) {
    const pct = Math.round(impactCount/weekPending.length*100);
    h += `<hr class="sec-divider">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px">
        <div class="sec-title" style="margin:0 0 8px">⚡ Your impact ratio this week</div>
        <div class="prog-row" style="margin-bottom:6px">
          <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--teal),var(--lav))"></div></div>
          <span class="prog-label">${impactCount} impact / ${weekPending.length} total (${pct}%)</span>
        </div>
        <div style="font-size:11px;color:var(--muted)">${pct>=50?'Good balance of impactful work this week.':'Most tasks are admin. Consider flagging ⚡ your most important work.'}</div>
      </div>`;
  }
  return h;
}

// ─────────────────────────────────────────────────────────────────────────────
// TAB: WORK
// ─────────────────────────────────────────────────────────────────────────────
function renderWork() { return kanbanTab('work'); }

// ─────────────────────────────────────────────────────────────────────────────
// TAB: TWINKLE HEARTS
// ─────────────────────────────────────────────────────────────────────────────
function renderTwinkle() {
  const discPending = tabTasks('twinkle').filter(t=>t.section==='discussion'&&t.status!=='done');
  const extra = `
    <hr class="sec-divider">
    ${secTitle('💬 For Discussion', discPending.length)}
    ${quickAdd('twinkle','discussion','Add discussion point…')}
    ${discPending.map(t=>`<div class="task-card"><label class="task-check" onclick="toggleTask('${t.id}')"><input type="checkbox"><span class="checkmark"></span></label><div class="task-body"><span class="task-title">${esc(t.title)}</span>${t.notes?`<span class="task-meta">${esc(t.notes)}</span>`:''}</div><div class="task-actions"><span class="dot dot-${t.priority||'medium'}"></span><button class="icon-btn-sm" onclick="removeTask('${t.id}')">×</button></div></div>`).join('')}
    <hr class="sec-divider">
    ${secTitle('✉️ Message Drafts', drafts.length)}
    <div class="quick-add" onclick="openDraftModal(null)" style="cursor:pointer"><span class="qa-plus">+</span><span style="font-size:13px;color:var(--meta)">New draft…</span></div>
    ${drafts.map(d=>`<div class="draft-card"><div class="draft-hdr"><span class="draft-title">${esc(d.title||'Untitled')}</span><span class="tag ${d.status==='ready'?'tag-green':d.status==='sent'?'tag-teal':'tag-orange'}">${d.status||'draft'}</span></div><div class="draft-preview">${esc((d.body||'').slice(0,90))}${(d.body||'').length>90?'…':''}</div><div class="draft-footer">${d.to_field?`<span class="tag">To: ${esc(d.to_field)}</span>`:''}<div class="draft-actions"><button class="btn-sm" onclick="openDraftModal('${d.id}')">Edit</button><button class="btn-sm" onclick="deleteDraft('${d.id}')">×</button></div></div></div>`).join('')}`;

  // Use kanbanTab but filter out discussion tasks from kanban
  const nonDisc = tasks.filter(t=>t.tab==='twinkle'&&t.section!=='discussion');
  const pending  = nonDisc.filter(t=>t.status!=='done');
  const done     = nonDisc.filter(t=>t.status==='done');
  let h = progBar(done.length, nonDisc.length);
  h += quickAdd('twinkle','','Add task…');
  h += `<div class="kanban">`;
  [['today','Today'],['week','This Week'],['someday','Someday']].forEach(([sec,label]) => {
    const items = pending.filter(t=>t.section===sec||(sec==='week'&&!['today','someday','discussion'].includes(t.section)));
    h += `<div class="kanban-col"><div class="kanban-col-hdr">${label}<span class="count-badge">${items.length}</span></div>${quickAdd('twinkle',sec,'Add…')}${items.map(taskCard).join('')}</div>`;
  });
  h += `</div>${extra}`;
  if (done.length) h += `<hr class="sec-divider">${secTitle('Done',done.length)}${done.slice(-6).map(taskCard).join('')}`;
  return h;
}

// ─────────────────────────────────────────────────────────────────────────────
// TAB: PARENTS
// ─────────────────────────────────────────────────────────────────────────────
function renderParents() { return kanbanTab('parents'); }

// ─────────────────────────────────────────────────────────────────────────────
// TAB: HEALTH
// ─────────────────────────────────────────────────────────────────────────────
function renderHealth() {
  const today = new Date();
  const dow = today.getDay();
  const mon = new Date(today); mon.setDate(today.getDate()-(dow===0?6:dow-1));
  const weekDates = Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d.toISOString().slice(0,10); });
  const todayStr = today.toISOString().slice(0,10);
  const labels = ['M','T','W','T','F','S','S'];

  let h = secTitle('Habits this week');
  if (!habits.habits.length) {
    h += `<div class="empty-state">No habits yet.<button class="btn-add" onclick="openHabitModal()" style="margin:8px auto 0;display:flex">+ Add habit</button></div>`;
  } else {
    h += `<div class="habits-table">`;
    habits.habits.forEach(hb => {
      const logMap = {};
      (habits.logs||[]).filter(l=>l.habit_id===hb.id).forEach(l=>{ logMap[l.log_date]=l.done===true||l.done==='true'; });
      h += `<div class="habit-row"><span class="habit-name">${esc(hb.emoji||'⭐')} ${esc(hb.name)}</span>
        <div class="habit-days">${weekDates.map((d,i)=>{const done=logMap[d];return `<div class="habit-day${done?' done':''}${d===todayStr?' today':''}" onclick="toggleHabit('${hb.id}','${d}',${!done})" title="${d}">${labels[i]}</div>`;}).join('')}</div>
        <button class="icon-btn-sm" onclick="removeHabit('${hb.id}')">×</button></div>`;
    });
    h += `</div>`;
  }
  h += `<button class="btn-add" onclick="openHabitModal()" style="margin-top:8px">+ Add habit</button>`;
  h += `<hr class="sec-divider">`;
  h += kanbanTab('health');
  return h;
}

async function toggleHabit(hid, date, done) {
  const logs = habits.logs||[];
  const ex = logs.find(l=>l.habit_id===hid&&l.log_date===date);
  if (ex) ex.done=done; else logs.push({id:'tmp_'+Date.now(),habit_id:hid,log_date:date,done});
  habits.logs = logs; renderTab(currentTab);
  try { await api('logHabit',{habit_id:hid,date,done}); } catch(e) { toast('Save failed','error'); }
}

async function removeHabit(id) {
  habits.habits = habits.habits.filter(h=>h.id!==id); renderTab('health');
  try { await api('deleteHabit',{id}); } catch(e) { toast('Failed','error'); }
}

// ─────────────────────────────────────────────────────────────────────────────
// TAB: SUPERMARKET
// ─────────────────────────────────────────────────────────────────────────────
function renderSupermarket() {
  const all = tabTasks('supermarket');
  const pending = all.filter(t=>t.status!=='done');
  const done    = all.filter(t=>t.status==='done');
  const cats = ['Produce','Dairy','Meat & Fish','Pantry','Frozen','Household','Other'];
  let h = progBar(done.length, all.length);
  h += quickAdd('supermarket','','Add item…');
  cats.forEach(cat => {
    const items = pending.filter(t=>(t.section||'Other')===cat);
    if (!items.length) return;
    h += `<div class="grocery-cat">${cat}</div>${items.map(taskCard).join('')}`;
  });
  const uncatted = pending.filter(t=>!cats.includes(t.section||'Other'));
  if (uncatted.length) { h += `<div class="grocery-cat">Other</div>${uncatted.map(taskCard).join('')}`; }
  if (done.length) h += `<hr class="sec-divider"><div class="grocery-cat">✓ Done (${done.length})</div>${done.map(taskCard).join('')}`;
  if (!all.length) h += `<div class="empty-state">List is empty. Add items above.</div>`;
  return h;
}

// ─────────────────────────────────────────────────────────────────────────────
// TAB: LEISURE & LEARN
// ─────────────────────────────────────────────────────────────────────────────
function renderLeisure() {
  const leisureSecs = [['connect','🤝 Connect — friends & celebrations'],['godo','🌍 Go / Do'],['read','📖 Read'],['create','🎨 Play / Create']];
  const learnSecs   = [['book','📘 Books'],['course','🎓 Courses'],['topic','💡 Topics']];

  const renderItems = (tab, sec) => tabTasks(tab).filter(t=>t.section===sec&&t.status!=='done').map(t=>{
    const cal = t.due_date ? gcalUrl(t.title,t.due_date) : null;
    return `<div class="task-card${isStale(t)?' t-stale':''}">
      <label class="task-check" onclick="toggleTask('${t.id}')"><input type="checkbox"><span class="checkmark"></span></label>
      ${boltBtn(t)}
      <div class="task-body">
        <span class="task-title">${esc(t.title)}</span>
        ${t.due_date?`<span class="task-due">📅 ${esc(t.due_date)}${cal?`<a href="${cal}" target="_blank" class="cal-link">+Cal</a>`:''}</span>`:`<span class="task-due"><button class="no-date-btn" onclick="promptDate('${t.id}')">Set date → Cal</button></span>`}
      </div>
      <button class="icon-btn-sm" onclick="removeTask('${t.id}')">×</button>
    </div>`;
  }).join('');

  const leftCol  = leisureSecs.map(([sec,label])=>`${secTitle(label)}${quickAdd('leisure',sec,'Add…')}${renderItems('leisure',sec)}`).join('<hr class="sec-divider">');
  const rightCol = learnSecs.map(([sec,label])=>`${secTitle(label)}${quickAdd('leisure',sec,'Add…')}${renderItems('leisure',sec)}`).join('<hr class="sec-divider">');
  return `<div class="two-col"><div>${leftCol}</div><div>${rightCol}</div></div>`;
}

async function promptDate(id) {
  const d = prompt('Enter date (YYYY-MM-DD):'); if (!d) return;
  await patchTask(id,{due_date:d}); renderTab(currentTab);
}

// ─────────────────────────────────────────────────────────────────────────────
// TAB: WEEKLY REVIEW
// ─────────────────────────────────────────────────────────────────────────────
function renderReview() {
  // Look Back
  const lookback = `<div class="review-card">
    <div class="review-hdr rh-lookback">🔍 Look Back</div>
    ${['What moved the needle this week?','What was just busy work / admin?','What am I grateful for or proud of?'].map((q,i)=>`
    <div class="review-q">
      <div class="review-prompt">${q}</div>
      <textarea class="review-ta" data-key="review_lb${i+1}" oninput="saveReviewField(this)">${esc(cfg[`review_lb${i+1}`]||'')}</textarea>
    </div>`).join('')}
  </div>`;

  // Balance Check
  const balanceRows = BALANCE_AREAS.map((area,ai) => {
    const score = parseInt(cfg[`balance_${ai}`])||0;
    const scoreColor = score<=2?'var(--high)':score>=4?'var(--low)':'var(--med)';
    return `<div class="balance-row">
      <span class="balance-label">${area}</span>
      <div class="balance-dots">${[1,2,3,4,5].map(n=>`<div class="bdot${n<=score?' filled':''}" onclick="setBalance(${ai},${n})" title="${n}/5"></div>`).join('')}</div>
      <span class="balance-score" style="color:${scoreColor}">${score||'—'}</span>
    </div>`;
  }).join('');
  const balance = `<div class="review-card"><div class="review-hdr rh-balance">🌿 Balance Check — rate each area 1–5</div>${balanceRows}</div>`;

  // Stale tasks
  const staleItems = allStale();
  const staleHtml = staleItems.length
    ? staleItems.map(t=>`<div class="stale-item">
        <div style="flex:1;font-size:12px;color:var(--text)">${esc(t.title)}</div>
        <span style="font-size:10px;color:var(--meta)">${TABS.find(x=>x.id===t.tab)?.label||t.tab}</span>
        <span class="stale-days">⏰ ${daysSince(t.created_at)}d</span>
        <div class="stale-actions">
          <button class="btn-keep" onclick="snoozeStale('${t.id}')">Keep</button>
          <button class="btn-sm" onclick="moveTask('${t.id}','week')">→ This Week</button>
          <button class="btn-drop" onclick="removeTask('${t.id}')">Drop</button>
        </div>
      </div>`).join('')
    : `<p style="font-size:13px;color:var(--low);text-align:center;padding:10px">✓ No stale tasks — great job!</p>`;
  const staleCard = `<div class="review-card"><div class="review-hdr rh-stale">⏰ Stale Tasks — 14+ days old <span class="count-badge">${staleItems.length}</span></div>${staleHtml}</div>`;

  // Next week MIT
  const mitNext = `<div class="review-card">
    <div class="review-hdr rh-mit">⚡ Next Week's MIT — Top 3 Priorities</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px">These will appear in your Today tab on Monday.</p>
    ${[1,2,3].map(n=>`<div class="mit-next">
      <div class="mit-num">${n}</div>
      <input class="mit-ta" type="text" value="${esc(cfg[`mit_today_${n}`]||'')}" placeholder="Priority ${n}…"
        oninput="saveMIT(${n},this.value)">
    </div>`).join('')}
  </div>`;

  // Intention
  const intention = `<div class="review-card">
    <div class="review-hdr rh-intention">🌅 Intention for Next Week</div>
    <textarea class="review-ta" style="min-height:64px" data-key="intention" oninput="saveReviewField(this)">${esc(cfg.intention||'')}</textarea>
  </div>`;

  return `<div class="two-col"><div>${lookback}${balance}</div><div>${staleCard}${mitNext}${intention}</div></div>`;
}

// Review field save (debounced, accessible from inline handler via wrapper function)
const _saveReviewField = debounce(async (key, value) => {
  cfg[key] = value;
  try { await api('setConfig',{key,value}); } catch(e) {}
}, 900);
function saveReviewField(el) { _saveReviewField(el.dataset.key, el.value); }

async function setBalance(areaIdx, score) {
  const key = `balance_${areaIdx}`;
  cfg[key] = score;
  document.querySelectorAll(`.balance-dots`).forEach((row, i) => {
    if (i !== areaIdx) return;
    row.querySelectorAll('.bdot').forEach((dot,n) => dot.classList.toggle('filled', n<score));
  });
  const scoreEl = document.querySelectorAll('.balance-score')[areaIdx];
  if (scoreEl) { scoreEl.textContent = score; scoreEl.style.color = score<=2?'var(--high)':score>=4?'var(--low)':'var(--med)'; }
  try { await api('setConfig',{key,value:score}); } catch(e) {}
}

// MIT save (accessible from inline handler via wrapper)
const _saveMIT = debounce(async (n, val) => {
  const key = `mit_today_${n}`;
  cfg[key] = val;
  try { await api('setConfig',{key,value:val}); } catch(e) {}
}, 700);
function saveMIT(n, val) { _saveMIT(n, val); }

// ─────────────────────────────────────────────────────────────────────────────
// TAB ROUTER
// ─────────────────────────────────────────────────────────────────────────────
function renderTab(tab) {
  const map = { today:renderToday, work:renderWork, twinkle:renderTwinkle, parents:renderParents, health:renderHealth, supermarket:renderSupermarket, leisure:renderLeisure, review:renderReview };
  try { setContent((map[tab]||(() => '<div class="empty-state">Coming soon</div>'))() ); }
  catch(e) { console.error(e); setContent(`<div class="empty-state">Error rendering tab: ${e.message}</div>`); }
}

// ─────────────────────────────────────────────────────────────────────────────
// MODALS: TASK MENU
// ─────────────────────────────────────────────────────────────────────────────
function openTaskMenu(id) {
  const t = tasks.find(x=>x.id===id); if (!t) return;
  document.getElementById('modal').innerHTML = `
    <div class="modal-hdr"><h3>Task Options</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <label>Title</label><input class="form-input" id="tm-title" value="${esc(t.title)}">
      <label>Priority</label>
      <div class="priority-picker">${['high','medium','low'].map(p=>`<button class="p-btn${t.priority===p?' active-'+p:''}" onclick="setPrio(this,'${p}')">${p}</button>`).join('')}</div>
      <label>Due Date</label><input class="form-input" id="tm-date" type="date" value="${t.due_date||''}">
      <label>Notes</label><textarea class="form-textarea" id="tm-notes">${esc(t.notes||'')}</textarea>
    </div>
    <div class="modal-ftr">
      <button class="btn-danger" onclick="removeTask('${id}');closeModal()">Delete</button>
      <div style="flex:1"></div>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTaskMenu('${id}')">Save</button>
    </div>`;
  openModal();
}

function setPrio(btn, p) {
  document.querySelectorAll('.p-btn').forEach(b => b.className='p-btn');
  btn.className = `p-btn active-${p}`;
}

async function saveTaskMenu(id) {
  const title    = document.getElementById('tm-title').value.trim();
  const due_date = document.getElementById('tm-date').value;
  const notes    = document.getElementById('tm-notes').value;
  const active   = document.querySelector('.p-btn[class*=active-]');
  const priority = active ? active.textContent.trim() : 'medium';
  if (!title) return;
  await patchTask(id,{title,due_date,notes,priority});
  closeModal(); renderTab(currentTab); updateTabProgress();
}

// ─────────────────────────────────────────────────────────────────────────────
// MODALS: DRAFTS
// ─────────────────────────────────────────────────────────────────────────────
function openDraftModal(id) {
  const d = id ? drafts.find(x=>x.id===id) : null;
  document.getElementById('modal').innerHTML = `
    <div class="modal-hdr"><h3>${d?'Edit Draft':'New Draft'}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <label>Title</label><input class="form-input" id="d-title" value="${esc(d?.title||'')}" placeholder="e.g. Weekly Volunteer Briefing">
      <label>To</label>
      <select class="form-select" id="d-to"><option value="">Select…</option>${['Volunteers','Staff','Master Planner','All'].map(v=>`<option value="${v}" ${d?.to_field===v?'selected':''}>${v}</option>`).join('')}</select>
      <label>Status</label>
      <select class="form-select" id="d-status">${[['draft','Draft'],['ready','Ready to send'],['sent','Sent']].map(([v,l])=>`<option value="${v}" ${(d?.status||'draft')===v?'selected':''}>${l}</option>`).join('')}</select>
      <label>Message</label><textarea class="form-textarea" id="d-body" style="min-height:140px">${esc(d?.body||'')}</textarea>
    </div>
    <div class="modal-ftr">
      ${d?`<button class="btn-danger" onclick="deleteDraft('${d.id}');closeModal()">Delete</button>`:''}
      <div style="flex:1"></div>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveDraft(${d?`'${d.id}'`:'null'})">Save</button>
    </div>`;
  openModal();
}

async function saveDraft(id) {
  const title=document.getElementById('d-title').value.trim();
  const body=document.getElementById('d-body').value;
  const to_field=document.getElementById('d-to').value;
  const status=document.getElementById('d-status').value;
  if (!title) { alert('Add a title.'); return; }
  if (id) {
    const d=drafts.find(x=>x.id===id); if (d) Object.assign(d,{title,body,to_field,status});
    await api('updateDraft',{id,title,body,to_field,status});
  } else {
    const tmp='tmp_'+Date.now();
    drafts.push({id:tmp,title,body,to_field,status,created_at:new Date().toISOString()});
    const r=await api('addDraft',{title,body,to_field,status});
    const d=drafts.find(x=>x.id===tmp); if (d) d.id=r.id;
  }
  closeModal(); renderTab('twinkle'); toast('Draft saved!');
}

async function deleteDraft(id) {
  drafts=drafts.filter(x=>x.id!==id); renderTab(currentTab);
  await api('deleteDraft',{id}); toast('Deleted');
}

// ─────────────────────────────────────────────────────────────────────────────
// MODALS: HABITS
// ─────────────────────────────────────────────────────────────────────────────
function openHabitModal() {
  document.getElementById('modal').innerHTML = `
    <div class="modal-hdr"><h3>Add Habit</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <label>Emoji</label><input class="form-input" id="h-emoji" value="⭐" style="width:70px">
      <label>Name</label><input class="form-input" id="h-name" placeholder="e.g. Morning walk, 8 glasses water" onkeydown="if(event.key==='Enter')saveHabit()">
    </div>
    <div class="modal-ftr"><div style="flex:1"></div><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveHabit()">Add</button></div>`;
  openModal(); setTimeout(()=>document.getElementById('h-name')?.focus(),50);
}

async function saveHabit() {
  const name=document.getElementById('h-name').value.trim();
  const emoji=document.getElementById('h-emoji').value.trim()||'⭐';
  if (!name) return;
  const tmp='tmp_'+Date.now();
  habits.habits.push({id:tmp,name,emoji,created_at:new Date().toISOString()});
  closeModal(); renderTab('health');
  const r=await api('addHabit',{name,emoji});
  const h=habits.habits.find(x=>x.id===tmp); if (h) h.id=r.id;
}

// ─────────────────────────────────────────────────────────────────────────────
// MODAL helpers
// ─────────────────────────────────────────────────────────────────────────────
function openModal()  { document.getElementById('overlay').classList.remove('hidden'); }
function closeModal() { document.getElementById('overlay').classList.add('hidden'); }

function openSettings() {
  document.getElementById('modal').innerHTML = `
    <div class="modal-hdr"><h3>⚙ Settings</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <label>Apps Script URL</label>
      <input class="form-input" id="s-url" type="url" value="${esc(SCRIPT_URL)}" placeholder="https://script.google.com/macros/s/…/exec">
      <p style="font-size:11px;color:var(--muted);margin-top:-4px">Paste your Google Apps Script web app URL. Stored only in this browser.</p>
    </div>
    <div class="modal-ftr">
      <div style="flex:1"></div>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveSettings()">Save &amp; Reconnect</button>
    </div>`;
  openModal();
  setTimeout(()=>document.getElementById('s-url')?.focus(), 50);
}

async function saveSettings() {
  const url = document.getElementById('s-url').value.trim();
  if (!url.includes('script.google.com')) { alert('Please enter a valid Apps Script URL.'); return; }
  SCRIPT_URL = url;
  localStorage.setItem(URL_KEY, url);
  closeModal();
  toast('URL saved — reconnecting…');
  await loadAll();
}

// ─────────────────────────────────────────────────────────────────────────────
// DARK MODE & INTENTION
// ─────────────────────────────────────────────────────────────────────────────
function toggleDark() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem(DARK_KEY, document.documentElement.classList.contains('dark'));
}

const _saveIntention = debounce(async ()=>{
  const val = document.getElementById('intention')?.value||'';
  cfg.intention = val;
  try { await api('setConfig',{key:'intention',value:val}); } catch(e) {}
},1000);
function onIntentionInput() { _saveIntention(); }

async function refreshAll() { await loadAll(); toast('Refreshed!'); }

// ─────────────────────────────────────────────────────────────────────────────
// TAB BAR
// ─────────────────────────────────────────────────────────────────────────────
function buildTabBar() {
  document.getElementById('tab-bar').innerHTML = TABS.map(t=>
    `<div class="tab${t.id===currentTab?' active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">
      ${t.icon} ${t.label}
      <div class="tab-prog"><div class="tab-prog-fill" id="prog-${t.id}" style="width:0%"></div></div>
    </div>`
  ).join('');
}

function updateTabProgress() {
  TABS.forEach(({id})=>{
    const all=tabTasks(id), done=all.filter(t=>t.status==='done').length;
    const el=document.getElementById('prog-'+id);
    if (el) el.style.width = all.length?(done/all.length*100)+'%':'0%';
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  const active=document.querySelector('.tab.active');
  if (active) active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  renderTab(tab);
}

// ─────────────────────────────────────────────────────────────────────────────
// SETUP & INIT
// ─────────────────────────────────────────────────────────────────────────────
function saveSetup() {
  const url = document.getElementById('setup-url').value.trim();
  if (!url.includes('script.google.com')) { alert('Please enter a valid Apps Script URL.'); return; }
  SCRIPT_URL = url; localStorage.setItem(URL_KEY, url);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  init();
}

function init() { buildTabBar(); loadAll(); }

if (localStorage.getItem(DARK_KEY)==='true') document.documentElement.classList.add('dark');
if (SCRIPT_URL) {
  document.getElementById('setup').style.display='none';
  document.getElementById('app').classList.remove('hidden');
  init();
}
</script>
